<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" width="1200" height="800">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D0D14"/>
      <stop offset="100%" style="stop-color:#12101E"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5C3FFF"/>
      <stop offset="100%" style="stop-color:#9B59FF"/>
    </linearGradient>
    <linearGradient id="chartGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#5C3FFF;stop-opacity:0.4"/>
      <stop offset="100%" style="stop-color:#5C3FFF;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="phoneShine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3a"/>
      <stop offset="100%" style="stop-color:#1a1a28"/>
    </linearGradient>
    <clipPath id="phoneClip">
      <rect x="370" y="40" width="270" height="560" rx="36"/>
    </clipPath>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softShadow">
      <feDropShadow dx="0" dy="20" stdDeviation="30" flood-color="#5C3FFF" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="800" fill="url(#bg)"/>

  <!-- Ambient glow behind phone -->
  <ellipse cx="505" cy="320" rx="180" ry="200" fill="#5C3FFF" opacity="0.08"/>

  <!-- Left side — Case Study Text -->
  <text x="80" y="120" font-family="serif" font-size="11" fill="#5C3FFF" letter-spacing="4" text-transform="uppercase" opacity="0.9">UX / UI DESIGN — 2024</text>
  <text x="80" y="185" font-family="serif" font-weight="bold" font-size="52" fill="#F5F0E8" letter-spacing="-1">WALLET</text>
  <text x="80" y="245" font-family="serif" font-weight="bold" font-size="52" fill="#F5F0E8" letter-spacing="-1">APP UI</text>

  <line x1="80" y1="275" x2="200" y2="275" stroke="#5C3FFF" stroke-width="2"/>

  <text x="80" y="315" font-family="sans-serif" font-weight="300" font-size="14" fill="#F5F0E8" opacity="0.55" width="260">A concept fintech mobile app</text>
  <text x="80" y="338" font-family="sans-serif" font-weight="300" font-size="14" fill="#F5F0E8" opacity="0.55">for managing crypto assets,</text>
  <text x="80" y="361" font-family="sans-serif" font-weight="300" font-size="14" fill="#F5F0E8" opacity="0.55">stocks, and NFT portfolios.</text>

  <!-- Stats -->
  <rect x="80" y="415" width="100" height="80" fill="#1a1a2e" rx="0"/>
  <text x="98" y="448" font-family="serif" font-weight="bold" font-size="26" fill="#5C3FFF">4</text>
  <text x="98" y="473" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.4" letter-spacing="2">SCREENS</text>

  <rect x="198" y="415" width="100" height="80" fill="#1a1a2e" rx="0"/>
  <text x="216" y="448" font-family="serif" font-weight="bold" font-size="26" fill="#5C3FFF">6w</text>
  <text x="216" y="473" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.4" letter-spacing="2">TIMELINE</text>

  <rect x="80" y="512" width="218" height="80" fill="#1a1a2e" rx="0"/>
  <text x="98" y="545" font-family="serif" font-weight="bold" font-size="26" fill="#5C3FFF">Figma</text>
  <text x="98" y="570" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.4" letter-spacing="2">DESIGN TOOL</text>

  <!-- Role tags -->
  <rect x="80" y="635" width="110" height="28" fill="#5C3FFF" opacity="0.15" rx="0"/>
  <text x="95" y="653" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="2">UX RESEARCH</text>

  <rect x="200" y="635" width="90" height="28" fill="#5C3FFF" opacity="0.15" rx="0"/>
  <text x="215" y="653" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="2">UI DESIGN</text>

  <rect x="80" y="672" width="100" height="28" fill="#5C3FFF" opacity="0.15" rx="0"/>
  <text x="95" y="690" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="2">PROTOTYPE</text>

  <rect x="190" y="672" width="110" height="28" fill="#5C3FFF" opacity="0.15" rx="0"/>
  <text x="205" y="690" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="2">BRANDING</text>

  <!-- Phone frame -->
  <rect x="368" y="38" width="274" height="564" rx="38" fill="#1e1c2e" filter="url(#softShadow)"/>
  <rect x="370" y="40" width="270" height="560" rx="36" fill="url(#phoneShine)"/>

  <!-- Phone screen content clipped -->
  <g clip-path="url(#phoneClip)">
    <!-- Screen bg -->
    <rect x="370" y="40" width="270" height="560" fill="#0D0D14"/>

    <!-- Status bar -->
    <text x="390" y="72" font-family="sans-serif" font-size="11" fill="#F5F0E8" opacity="0.5">9:41</text>
    <rect x="590" y="62" width="28" height="12" rx="6" fill="none" stroke="#F5F0E8" stroke-width="1" opacity="0.4"/>
    <rect x="592" y="64" width="22" height="8" rx="4" fill="#F5F0E8" opacity="0.5"/>

    <!-- Balance card -->
    <rect x="382" y="86" width="246" height="126" rx="16" fill="url(#cardGrad)"/>
    <text x="400" y="112" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)" letter-spacing="1.5">TOTAL BALANCE</text>
    <text x="400" y="150" font-family="serif" font-weight="bold" font-size="30" fill="#fff">$45,230</text>
    <text x="400" y="172" font-family="sans-serif" font-size="10" fill="rgba(255,255,255,0.7)">.84</text>
    <rect x="400" y="183" width="60" height="18" rx="9" fill="rgba(255,255,255,0.15)"/>
    <text x="414" y="196" font-family="sans-serif" font-size="10" fill="#fff">↑ 4.2%</text>
    <text x="540" y="196" font-family="sans-serif" font-size="18" fill="rgba(255,255,255,0.3)">⋯</text>

    <!-- Mini chart in card -->
    <polyline points="480,195 495,188 510,192 525,178 540,183 555,170 570,175 585,162 600,168 615,155 628,160" fill="none" stroke="rgba(255,255,255,0.4)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Section label -->
    <text x="390" y="236" font-family="sans-serif" font-size="11" fill="#F5F0E8" opacity="0.4" letter-spacing="2">ASSETS</text>

    <!-- Asset rows -->
    <!-- BTC -->
    <circle cx="402" cy="262" r="12" fill="#F7931A" opacity="0.9"/>
    <text x="397" y="267" font-family="serif" font-weight="bold" font-size="10" fill="#fff">₿</text>
    <text x="422" y="258" font-family="sans-serif" font-weight="600" font-size="12" fill="#F5F0E8">Bitcoin</text>
    <text x="422" y="272" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">0.812 BTC</text>
    <text x="570" y="258" font-family="serif" font-weight="bold" font-size="12" fill="#F5F0E8" text-anchor="end">$23,410</text>
    <text x="570" y="272" font-family="sans-serif" font-size="10" fill="#4ade80" text-anchor="end">+2.3%</text>

    <line x1="390" y1="283" x2="618" y2="283" stroke="#F5F0E8" stroke-width="0.5" opacity="0.08"/>

    <!-- ETH -->
    <circle cx="402" cy="306" r="12" fill="#627EEA"/>
    <text x="397" y="311" font-family="serif" font-weight="bold" font-size="10" fill="#fff">Ξ</text>
    <text x="422" y="302" font-family="sans-serif" font-weight="600" font-size="12" fill="#F5F0E8">Ethereum</text>
    <text x="422" y="316" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">4.5 ETH</text>
    <text x="570" y="302" font-family="serif" font-weight="bold" font-size="12" fill="#F5F0E8" text-anchor="end">$14,220</text>
    <text x="570" y="316" font-family="sans-serif" font-size="10" fill="#4ade80" text-anchor="end">+5.1%</text>

    <line x1="390" y1="327" x2="618" y2="327" stroke="#F5F0E8" stroke-width="0.5" opacity="0.08"/>

    <!-- SOL -->
    <circle cx="402" cy="350" r="12" fill="#9945FF"/>
    <text x="397" y="355" font-family="serif" font-weight="bold" font-size="9" fill="#fff">S</text>
    <text x="422" y="346" font-family="sans-serif" font-weight="600" font-size="12" fill="#F5F0E8">Solana</text>
    <text x="422" y="360" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">32.0 SOL</text>
    <text x="570" y="346" font-family="serif" font-weight="bold" font-size="12" fill="#F5F0E8" text-anchor="end">$5,440</text>
    <text x="570" y="360" font-family="sans-serif" font-size="10" fill="#f87171" text-anchor="end">-1.2%</text>

    <line x1="390" y1="371" x2="618" y2="371" stroke="#F5F0E8" stroke-width="0.5" opacity="0.08"/>

    <!-- ADA -->
    <circle cx="402" cy="394" r="12" fill="#0033AD"/>
    <text x="397" y="399" font-family="serif" font-weight="bold" font-size="9" fill="#fff">A</text>
    <text x="422" y="390" font-family="sans-serif" font-weight="600" font-size="12" fill="#F5F0E8">Cardano</text>
    <text x="422" y="404" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">5200 ADA</text>
    <text x="570" y="390" font-family="serif" font-weight="bold" font-size="12" fill="#F5F0E8" text-anchor="end">$2,160</text>
    <text x="570" y="404" font-family="sans-serif" font-size="10" fill="#4ade80" text-anchor="end">+0.8%</text>

    <!-- Portfolio chart area -->
    <text x="390" y="432" font-family="sans-serif" font-size="11" fill="#F5F0E8" opacity="0.4" letter-spacing="2">7D PERFORMANCE</text>
    <rect x="382" y="442" width="246" height="80" rx="12" fill="#1a1a2e"/>
    <polygon points="390,510 410,492 435,500 460,478 490,483 520,462 550,470 580,452 610,460 628,448 628,518 390,518" fill="url(#chartGrad)"/>
    <polyline points="390,510 410,492 435,500 460,478 490,483 520,462 550,470 580,452 610,460 628,448" fill="none" stroke="#5C3FFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" filter="url(#glow)"/>

    <!-- Bottom nav -->
    <rect x="370" y="560" width="270" height="40" fill="#0D0D14"/>
    <text x="415" y="585" font-family="sans-serif" font-size="16" fill="#5C3FFF" text-anchor="middle">⌂</text>
    <text x="465" y="585" font-family="sans-serif" font-size="14" fill="#F5F0E8" opacity="0.25" text-anchor="middle">◫</text>
    <text x="515" y="585" font-family="sans-serif" font-size="14" fill="#F5F0E8" opacity="0.25" text-anchor="middle">↕</text>
    <text x="565" y="585" font-family="sans-serif" font-size="14" fill="#F5F0E8" opacity="0.25" text-anchor="middle">⊙</text>
    <circle cx="415" cy="595" r="2.5" fill="#5C3FFF"/>
  </g>

  <!-- Phone notch -->
  <rect x="468" y="40" width="74" height="22" rx="11" fill="#1e1c2e"/>

  <!-- Right side — color palette & details -->
  <text x="720" y="120" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.3" letter-spacing="3">COLOR SYSTEM</text>
  <rect x="720" y="135" width="50" height="50" fill="#5C3FFF" rx="0"/>
  <rect x="778" y="135" width="50" height="50" fill="#9B59FF" rx="0"/>
  <rect x="836" y="135" width="50" height="50" fill="#0D0D14" rx="0"/>
  <rect x="836" y="135" width="50" height="50" fill="none" stroke="#2a2a2a" stroke-width="1" rx="0"/>
  <rect x="894" y="135" width="50" height="50" fill="#F5F0E8" rx="0"/>
  <rect x="952" y="135" width="50" height="50" fill="#4ade80" rx="0"/>
  <rect x="1010" y="135" width="50" height="50" fill="#f87171" rx="0"/>

  <text x="720" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#5C3FFF</text>
  <text x="778" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#9B59FF</text>
  <text x="836" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#0D0D14</text>
  <text x="894" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#F5F0E8</text>
  <text x="952" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#4ADE80</text>
  <text x="1010" y="210" font-family="sans-serif" font-size="9" fill="#F5F0E8" opacity="0.25">#F87171</text>

  <!-- Typography -->
  <text x="720" y="260" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.3" letter-spacing="3">TYPOGRAPHY</text>
  <text x="720" y="305" font-family="serif" font-weight="bold" font-size="36" fill="#F5F0E8">Inter</text>
  <text x="720" y="330" font-family="sans-serif" font-size="12" fill="#F5F0E8" opacity="0.35">Display / Headings</text>
  <text x="860" y="305" font-family="sans-serif" font-size="28" fill="#F5F0E8" opacity="0.6">SF Pro</text>
  <text x="860" y="330" font-family="sans-serif" font-size="12" fill="#F5F0E8" opacity="0.35">Body / Labels</text>

  <!-- Problem / Solution -->
  <line x1="720" y1="360" x2="1120" y2="360" stroke="#1a1a2e" stroke-width="1"/>

  <text x="720" y="395" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="3">THE CHALLENGE</text>
  <text x="720" y="420" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">Most crypto apps overwhelm users</text>
  <text x="720" y="440" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">with data. The goal: make portfolio</text>
  <text x="720" y="460" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">tracking feel effortless and clear.</text>

  <line x1="720" y1="485" x2="1120" y2="485" stroke="#1a1a2e" stroke-width="1"/>

  <text x="720" y="518" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="3">THE SOLUTION</text>
  <text x="720" y="543" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">A single-screen overview card,</text>
  <text x="720" y="563" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">live sparklines per asset, and a</text>
  <text x="720" y="583" font-family="sans-serif" font-size="13" fill="#F5F0E8" opacity="0.7">minimal dark UI to reduce noise.</text>

  <line x1="720" y1="605" x2="1120" y2="605" stroke="#1a1a2e" stroke-width="1"/>

  <!-- Bottom metrics -->
  <text x="720" y="640" font-family="sans-serif" font-size="10" fill="#5C3FFF" letter-spacing="3">OUTCOME</text>
  <text x="720" y="680" font-family="serif" font-weight="bold" font-size="32" fill="#F5F0E8">92<tspan font-size="14" opacity="0.4">%</tspan></text>
  <text x="720" y="700" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">USER CLARITY SCORE</text>
  <text x="830" y="680" font-family="serif" font-weight="bold" font-size="32" fill="#F5F0E8">3<tspan font-size="14" opacity="0.4">s</tspan></text>
  <text x="830" y="700" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">AVG TIME-TO-INFO</text>
  <text x="930" y="680" font-family="serif" font-weight="bold" font-size="32" fill="#F5F0E8">4<tspan font-size="14" opacity="0.4"> screens</tspan></text>
  <text x="930" y="700" font-family="sans-serif" font-size="10" fill="#F5F0E8" opacity="0.35">FULL FLOW COVERAGE</text>
</svg>
